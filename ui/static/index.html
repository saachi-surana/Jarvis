<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #191724;
  --conv-bg: #0f0e17;
  --surface: #1f1d2e;
  --overlay: #26233a;
  --foam:    #9ccfd8;
  --iris:    #c4a7e7;
  --text:    #e0def4;
  --muted:   #6e6a86;
  --dim:     #2a2845;
  --mono:    'Monaco', 'Courier New', monospace;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--mono);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Corner brackets ──────────────────────────────────────────────────────── */
.corner {
  position: fixed;
  width: 20px; height: 20px;
  z-index: 200;
  opacity: 0.85;
}
#c-tl { top: 9px;  left: 9px;  border-top: 1px solid var(--iris); border-left:  1px solid var(--iris); }
#c-tr { top: 9px;  right: 9px; border-top: 1px solid var(--iris); border-right: 1px solid var(--iris); }
#c-bl { bottom: 9px; left: 9px;  border-bottom: 1px solid var(--iris); border-left:  1px solid var(--iris); }
#c-br { bottom: 9px; right: 9px; border-bottom: 1px solid var(--iris); border-right: 1px solid var(--iris); }

/* ── App shell ────────────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}

/* ── HUD section ──────────────────────────────────────────────────────────── */
#hud-section {
  position: relative;
  height: 200px;
  flex-shrink: 0;
  overflow: hidden;
}

#hud-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
}

/* Title row */
#title-row {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 36px;
  gap: 14px;
  z-index: 10;
}

.hud-rule {
  flex: 1;
  position: relative;
  height: 1px;
}
.hud-rule.left  { background: linear-gradient(to left,  var(--muted), transparent); }
.hud-rule.right { background: linear-gradient(to right, var(--muted), transparent); }
/* Tick marks on the rules */
.hud-rule.left::before  { content: ''; position: absolute; right:  0; top: -3px; width: 1px; height: 7px; background: var(--iris); }
.hud-rule.left::after   { content: ''; position: absolute; right: 22%; top: -2px; width: 1px; height: 5px; background: var(--muted); }
.hud-rule.right::before { content: ''; position: absolute; left:  0; top: -3px; width: 1px; height: 7px; background: var(--iris); }
.hud-rule.right::after  { content: ''; position: absolute; left: 22%; top: -2px; width: 1px; height: 5px; background: var(--muted); }

#main-title {
  color: var(--foam);
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 8px;
  white-space: nowrap;
  text-shadow:
    0 0 6px  rgba(156,207,216,.95),
    0 0 14px rgba(156,207,216,.75),
    0 0 28px rgba(156,207,216,.55),
    0 0 56px rgba(156,207,216,.30);
}

/* Data readouts */
.readout {
  position: absolute;
  font-size: 8px;
  color: var(--muted);
  line-height: 1.6;
  letter-spacing: 1px;
  white-space: pre;
  opacity: 0.65;
  z-index: 10;
}
#dr-tl { top: 50px; left: 14px; }
#dr-tr { top: 50px; right: 14px; text-align: right; }
#dr-bl { bottom: 8px; left: 14px; font-size: 7px; opacity: 0.5; }
#dr-br { bottom: 8px; right: 14px; text-align: right; font-size: 7px; opacity: 0.5; }

/* HUD bottom border */
#hud-section::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--muted) 20%, var(--iris) 50%, var(--muted) 80%, transparent);
}

/* ── Chat area ────────────────────────────────────────────────────────────── */
#chat-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--conv-bg);
  padding: 14px 18px 8px;
}

#chat-container::-webkit-scrollbar       { width: 3px; }
#chat-container::-webkit-scrollbar-track { background: var(--conv-bg); }
#chat-container::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.message {
  margin-bottom: 14px;
  animation: scan-in 0.2s ease-out both;
}

@keyframes scan-in {
  from { opacity: 0; transform: translateY(5px); filter: brightness(1.8); }
  to   { opacity: 1; transform: translateY(0);   filter: brightness(1); }
}

.msg-prefix {
  font-size: 9px;
  letter-spacing: 3px;
  margin-bottom: 4px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 6px;
}
.msg-prefix::after {
  content: '';
  flex: 1;
  height: 1px;
  opacity: 0.2;
}
.msg-prefix.jarvis        { color: var(--foam); }
.msg-prefix.jarvis::after { background: var(--foam); }
.msg-prefix.user          { color: var(--iris); }
.msg-prefix.user::after   { background: var(--iris); }

.msg-body {
  font-size: 12px;
  line-height: 1.7;
  padding-left: 12px;
  border-left: 2px solid;
  user-select: text;
}
.msg-body.jarvis { color: var(--foam);  border-color: rgba(156,207,216,.3); }
.msg-body.user   { color: var(--text);  border-color: rgba(196,167,231,.3); }

/* Typing cursor inside active message */
.msg-body.typing::after {
  content: '▋';
  animation: blink .7s step-end infinite;
  color: var(--foam);
  font-size: 10px;
}

/* ── Status bar ───────────────────────────────────────────────────────────── */
#status-bar {
  height: 28px;
  background: var(--bg);
  border-top: 1px solid var(--dim);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  flex-shrink: 0;
}

#status-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
}

.sdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--foam);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.sdot.active {
  animation: dot-pulse 0.6s ease-in-out infinite alternate;
}
.sdot.listening { background: var(--iris); }
@keyframes dot-pulse {
  from { opacity: .4; box-shadow: none; }
  to   { opacity: 1;  box-shadow: 0 0 6px currentColor, 0 0 14px rgba(156,207,216,.4); }
}

.blink-cursor { animation: blink 1s step-end infinite; color: var(--foam); }
@keyframes blink { 50% { opacity: 0; } }

#status-right {
  font-size: 8px;
  color: #333050;
  letter-spacing: 1px;
}

/* ── Input row ────────────────────────────────────────────────────────────── */
#input-row {
  height: 64px;
  background: var(--bg);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  flex-shrink: 0;
  border-top: 1px solid var(--dim);
}

/* Mic button */
#mic-btn {
  position: relative;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--foam);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--foam);
  font-size: 13px;
  transition: box-shadow .2s, border-color .2s;
  outline: none;
}
#mic-btn:hover { box-shadow: 0 0 10px rgba(156,207,216,.45); }

#mic-btn.recording {
  border-color: var(--iris);
  color: var(--iris);
  animation: mic-glow .9s ease-in-out infinite alternate;
}
@keyframes mic-glow {
  from { box-shadow: 0 0 6px  rgba(196,167,231,.4); }
  to   { box-shadow: 0 0 22px rgba(196,167,231,.8), 0 0 40px rgba(196,167,231,.25); }
}
#mic-btn.recording::before {
  content: '';
  position: absolute; inset: -9px;
  border-radius: 50%;
  border: 1px solid rgba(196,167,231,.45);
  animation: ring-pulse 1.3s ease-out infinite;
}
#mic-btn.recording::after {
  content: '';
  position: absolute; inset: -17px;
  border-radius: 50%;
  border: 1px solid rgba(196,167,231,.2);
  animation: ring-pulse 1.3s ease-out .45s infinite;
}
@keyframes ring-pulse {
  from { transform: scale(.8); opacity: .8; }
  to   { transform: scale(1.3); opacity: 0; }
}

/* Text input */
#input-border {
  flex: 1;
  border: 1px solid var(--dim);
  padding: 1px;
  transition: border-color .2s, box-shadow .2s;
}
#input-border:focus-within {
  border-color: var(--foam);
  box-shadow: 0 0 10px rgba(156,207,216,.25), inset 0 0 10px rgba(156,207,216,.04);
}
#text-input {
  width: 100%;
  background: var(--surface);
  border: none; outline: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 9px 11px;
  letter-spacing: 1px;
  caret-color: var(--foam);
}
#text-input::placeholder { color: #33304a; letter-spacing: 2px; }

/* Send */
#send-btn {
  background: transparent; border: none;
  color: var(--foam); font-size: 16px;
  cursor: pointer; padding: 4px 8px;
  transition: color .2s, text-shadow .2s;
  outline: none;
}
#send-btn:hover {
  color: var(--text);
  text-shadow: 0 0 10px rgba(156,207,216,.8);
}
</style>
</head>
<body>

<!-- Corner brackets -->
<div class="corner" id="c-tl"></div>
<div class="corner" id="c-tr"></div>
<div class="corner" id="c-bl"></div>
<div class="corner" id="c-br"></div>

<div id="app">

  <!-- ── HUD section ────────────────────────────────────────────────── -->
  <div id="hud-section">
    <canvas id="hud-canvas"></canvas>

    <div id="title-row">
      <div class="hud-rule left"></div>
      <h1 id="main-title">J.A.R.V.I.S</h1>
      <div class="hud-rule right"></div>
    </div>

    <div class="readout" id="dr-tl"></div>
    <div class="readout" id="dr-tr"></div>
    <div class="readout" id="dr-bl"></div>
    <div class="readout" id="dr-br"></div>
  </div>

  <!-- ── Conversation ───────────────────────────────────────────────── -->
  <div id="chat-container">
    <div id="messages"></div>
  </div>

  <!-- ── Status bar ────────────────────────────────────────────────── -->
  <div id="status-bar">
    <div id="status-left">
      <div class="sdot" id="sdot"></div>
      <span id="status-text">SYSTEM READY</span>
      <span class="blink-cursor">_</span>
    </div>
    <div id="status-right" id="sys-metrics"></div>
  </div>

  <!-- ── Input row ──────────────────────────────────────────────────── -->
  <div id="input-row">
    <button id="mic-btn" title="Voice input">🎤</button>
    <div id="input-border">
      <input id="text-input" type="text" autocomplete="off"
             spellcheck="false" placeholder="ENTER COMMAND...">
    </div>
    <button id="send-btn">▶</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   CANVAS — rings + radar sweep
═══════════════════════════════════════════════════════════════════════════ */
const canvas = document.getElementById('hud-canvas');
const ctx    = canvas.getContext('2d');

let CW, CH, CX, CY;

function resizeCanvas() {
  CW = canvas.offsetWidth;
  CH = canvas.offsetHeight;
  canvas.width  = CW;
  canvas.height = CH;
  CX = CW / 2;
  CY = CH / 2 + 14;   // slightly below true centre so title clears
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Ring definitions
const RINGS = [
  { r: 52,  angle: 0,            speed:  0.007,  alpha: 0.50, color: '156,207,216', dash: [18, 9]  },
  { r: 71,  angle: Math.PI/3,    speed: -0.0045, alpha: 0.38, color: '196,167,231', dash: [26, 14] },
  { r: 91,  angle: Math.PI,      speed:  0.003,  alpha: 0.25, color: '156,207,216', dash: [11, 20] },
];
const INNER_RING = { r: 30, alpha: 0.18, color: '196,167,231', dash: [8, 6] };

let sweepAngle = 0;
let isThinking = false;

function drawSweep() {
  const maxR = RINGS[RINGS.length - 1].r + 8;
  const trailSteps = 42;
  const trailSpan  = Math.PI * 0.65;

  // Fading trail wedges
  for (let i = trailSteps; i >= 0; i--) {
    const a0 = sweepAngle - trailSpan + (i / trailSteps) * trailSpan;
    const a1 = a0 + trailSpan / trailSteps + 0.01;
    const op = (i / trailSteps) * (isThinking ? 0.30 : 0.20);
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, maxR, a0, a1);
    ctx.closePath();
    ctx.fillStyle = `rgba(156,207,216,${op})`;
    ctx.fill();
  }

  // Main sweep line
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(
    CX + maxR * Math.cos(sweepAngle),
    CY + maxR * Math.sin(sweepAngle)
  );
  ctx.strokeStyle = `rgba(156,207,216,${isThinking ? 1.0 : 0.75})`;
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Bright tip dot
  ctx.beginPath();
  ctx.arc(
    CX + maxR * Math.cos(sweepAngle),
    CY + maxR * Math.sin(sweepAngle),
    isThinking ? 3 : 2, 0, Math.PI * 2
  );
  ctx.fillStyle = 'rgba(156,207,216,1)';
  ctx.fill();
}

function drawRings() {
  const speedMult  = isThinking ? 3.2 : 1;
  const alphaMult  = isThinking ? 1.4 : 1;

  RINGS.forEach(ring => {
    ring.angle += ring.speed * speedMult;

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(ring.angle);

    // Glow halo when thinking
    if (isThinking) {
      ctx.beginPath();
      ctx.arc(0, 0, ring.r, 0, Math.PI * 2);
      ctx.setLineDash([]);
      ctx.strokeStyle = `rgba(${ring.color},0.08)`;
      ctx.lineWidth   = 6;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(0, 0, ring.r, 0, Math.PI * 2);
    ctx.setLineDash(ring.dash);
    ctx.lineDashOffset = -(ring.angle * ring.r * 0.15);
    ctx.strokeStyle    = `rgba(${ring.color},${Math.min(ring.alpha * alphaMult, 0.85)})`;
    ctx.lineWidth      = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  });

  // Static inner ring (no rotation, very dim)
  ctx.beginPath();
  ctx.arc(CX, CY, INNER_RING.r, 0, Math.PI * 2);
  ctx.setLineDash(INNER_RING.dash);
  ctx.strokeStyle = `rgba(${INNER_RING.color},${INNER_RING.alpha})`;
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCenterCrosshair() {
  const a = isThinking ? 0.55 : 0.30;

  // Cross lines
  ctx.strokeStyle = `rgba(156,207,216,${a})`;
  ctx.lineWidth   = 0.5;
  ctx.beginPath();
  ctx.moveTo(CX - 18, CY);
  ctx.lineTo(CX + 18, CY);
  ctx.moveTo(CX, CY - 18);
  ctx.lineTo(CX, CY + 18);
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(CX, CY, isThinking ? 4 : 3, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(156,207,216,${isThinking ? 0.9 : 0.65})`;
  ctx.fill();

  if (isThinking) {
    // Outer glow ring when thinking
    ctx.beginPath();
    ctx.arc(CX, CY, 7, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(156,207,216,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

let lastTs = 0;
function animate(ts) {
  ctx.clearRect(0, 0, CW, CH);
  const dt      = (ts - lastTs) / 16.67;  // normalise to 60fps
  lastTs        = ts;
  const spd     = isThinking ? 2.5 : 1;
  sweepAngle   += 0.022 * spd * Math.min(dt, 3);

  drawSweep();
  drawRings();
  drawCenterCrosshair();

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);


/* ═══════════════════════════════════════════════════════════════════════════
   DATA FLICKER
═══════════════════════════════════════════════════════════════════════════ */
const FCHARS = '0123456789ABCDEF▌▐░▒';

function rndLine(len = 9) {
  return Array.from({length: len},
    () => FCHARS[Math.floor(Math.random() * FCHARS.length)]
  ).join('');
}

const READOUTS = [
  { el: document.getElementById('dr-tl'), rows: 3, len: 9 },
  { el: document.getElementById('dr-tr'), rows: 3, len: 9 },
  { el: document.getElementById('dr-bl'), rows: 1, len: 12 },
  { el: document.getElementById('dr-br'), rows: 1, len: 12 },
];

function flickerTick() {
  READOUTS.forEach(r => {
    if (Math.random() < 0.35) {
      r.el.textContent = Array.from(
        {length: r.rows}, () => rndLine(r.len)
      ).join('\n');
    }
  });
}
setInterval(flickerTick, 180);
flickerTick();


/* ═══════════════════════════════════════════════════════════════════════════
   SYSTEM METRICS (fake, slowly drifting)
═══════════════════════════════════════════════════════════════════════════ */
const metricsEl = document.getElementById('status-right');
let cpuVal = 8, memVal = 34;

function updateMetrics() {
  cpuVal = Math.max(2, Math.min(98, cpuVal + (Math.random() * 4 - 2)));
  memVal = Math.max(20, Math.min(80, memVal + (Math.random() * 2 - 1)));
  metricsEl.textContent =
    `CPU:${cpuVal.toFixed(0).padStart(2,'0')}% // MEM:${memVal.toFixed(0)}% // SYS:OK`;
}
setInterval(updateMetrics, 2200);
updateMetrics();


/* ═══════════════════════════════════════════════════════════════════════════
   STATUS
═══════════════════════════════════════════════════════════════════════════ */
const sdotEl   = document.getElementById('sdot');
const statusEl = document.getElementById('status-text');

function setStatus(state, text) {
  statusEl.textContent = text;
  sdotEl.className     = 'sdot';
  isThinking           = false;

  if (state === 'thinking' || state === 'transcribing') {
    sdotEl.classList.add('active');
    isThinking = true;
  } else if (state === 'listening') {
    sdotEl.classList.add('active', 'listening');
  }
}


/* ═══════════════════════════════════════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════════════════════════════════════ */
const messagesEl = document.getElementById('messages');
const chatEl     = document.getElementById('chat-container');

function scrollDown() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function appendMessage(speaker, text) {
  const wrap  = document.createElement('div');
  wrap.className = 'message';

  const pre   = document.createElement('div');
  pre.className = `msg-prefix ${speaker}`;
  pre.textContent = speaker === 'jarvis' ? '▎ JARVIS' : '▎ YOU';

  const body  = document.createElement('div');
  body.className = `msg-body ${speaker}`;

  wrap.appendChild(pre);
  wrap.appendChild(body);
  messagesEl.appendChild(wrap);
  scrollDown();

  if (speaker === 'jarvis') {
    body.classList.add('typing');
    let i = 0;
    const speed = text.length > 250 ? 5 : 9;
    const tick = setInterval(() => {
      body.textContent = text.slice(0, i);
      i++;
      scrollDown();
      if (i > text.length) {
        clearInterval(tick);
        body.classList.remove('typing');
      }
    }, speed);
  } else {
    body.textContent = text;
    scrollDown();
  }
}


/* ═══════════════════════════════════════════════════════════════════════════
   SOCKETIO
═══════════════════════════════════════════════════════════════════════════ */
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  console.log('[JARVIS] Connection established');
});

socket.on('disconnect', () => {
  setStatus('offline', 'OFFLINE');
});

socket.on('status_update', data => {
  setStatus(data.state, data.text);
});

socket.on('user_message', data => {
  appendMessage('user', data.text);
});

socket.on('jarvis_response', data => {
  appendMessage('jarvis', data.text);
});


/* ═══════════════════════════════════════════════════════════════════════════
   INPUT HANDLERS
═══════════════════════════════════════════════════════════════════════════ */
const textInput = document.getElementById('text-input');
const sendBtn   = document.getElementById('send-btn');
const micBtn    = document.getElementById('mic-btn');
let   recording = false;

function sendInput() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = '';
  appendMessage('user', text);
  setStatus('thinking', 'PROCESSING...');
  socket.emit('user_input', { text });
}

sendBtn.addEventListener('click', sendInput);

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendInput();
  }
});

micBtn.addEventListener('click', () => {
  if (recording) return;
  recording = true;
  micBtn.classList.add('recording');
  socket.emit('mic_trigger');

  // Auto-clear recording state after max recording time + transcription buffer
  setTimeout(() => {
    recording = false;
    micBtn.classList.remove('recording');
  }, 14000);
});

// Clear recording indicator when status returns to ready/thinking
socket.on('status_update', data => {
  if (data.state !== 'listening') {
    recording = false;
    micBtn.classList.remove('recording');
  }
});


/* ═══════════════════════════════════════════════════════════════════════════
   BOOT ANIMATION
═══════════════════════════════════════════════════════════════════════════ */
(function bootSequence() {
  const title = document.getElementById('main-title');
  title.style.opacity = '0';

  // Brief delay then flicker-on
  setTimeout(() => {
    const originalShadow = title.style.textShadow;
    let n = 0;
    const flicker = setInterval(() => {
      title.style.opacity = n % 2 === 0 ? '1' : '0.1';
      n++;
      if (n > 7) {
        clearInterval(flicker);
        title.style.opacity = '1';
      }
    }, 70);
  }, 400);

  // Boot message
  setTimeout(() => {
    appendMessage('jarvis', 'All systems nominal. J.A.R.V.I.S online.');
  }, 900);
})();
</script>
